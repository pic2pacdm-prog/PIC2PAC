<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Sheet Modules</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:36px;
    color:#1e3c72;
}

.header p{
    color:#666;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:25px;
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:35px 20px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.icon{
    width:70px;
    height:70px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    margin:auto;
    margin-bottom:15px;
}

.title{
    font-size:20px;
    font-weight:600;
    color:#333;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#777;
}

</style>
</head>
<body>

<div class="header">
    <h1>Pic2Pac India Private Limited</h1>
    <p>Google Sheet Modules</p>
</div>

<div class="grid">

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/14w_Kd4xtwTYgtNqHnq14yyWymHB_EfwjIU1_NPTXwHE/edit?gid=0#gid=0/d/BW_LINK')">
        <div class="icon">YBW</div>
        <div class="title">YPBW</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/1dkghEcBoyWMKDA4mWaa85wwxyVl1_aRJEUsliRVi6YQ/edit?gid=0#gid=0/d/BW_LINK')">
        <div class="icon">BW</div>
        <div class="title">BW</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/18hyoREK4vuFdJJacXCoMbVRXQqyQEv_cWEOnIdxI9hE/edit?gid=0#gid=0')">
        <div class="icon">G&G</div>
        <div class="title">GIN GIA</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/1rMuuvCzXPG0VB9zrM0A1Jo_y1yNsVtQHI1Yd38-xjhY/edit?gid=0#gid=0')">
        <div class="icon">GA</div>
        <div class="title">W/GIA</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/1iTjNr1MAwOgL4tqipDK1lXfBXdEDCZwmZ4xF-s89h6M/edit?gid=0#gid=0')">
        <div class="icon">YPJ</div>
        <div class="title">JMI</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/1B8fpHxQB8aHVIywq7c4jfmmEFSUuNgmg9fW_yYZZZTI/edit?gid=0#gid=0')">
        <div class="icon">EC</div>
        <div class="title">EC</div>
    </div>

    <div class="card" onclick="openSheet('https://docs.google.com/spreadsheets/d/1lege2MT8RZ8i7gGT5YpFwknzanZTjK8OV3IQNFLcFmI/edit?gid=0#gid=0')">
        <div class="icon">EB</div>
        <div class="title">EB</div>
    </div>

</div>

<div class="footer">
    © 2026 Module Dashboard
</div>

<script>

function openSheet(url){
    window.open(url, '_blank');
}

</script>

</body>
</html>
